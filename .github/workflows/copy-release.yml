name: Copy Release to Public Repo
on:
  release:
    types: [published]

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: andrewthetechie/gha-clone-releases@v1.7.0
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          src_repo: darshan-regmi/veil
          dest_repo: darshan-regmi/project-releases  # <-- fixed
          copy_assets: true
