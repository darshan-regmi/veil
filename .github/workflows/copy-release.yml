name: Copy Release to Public Repo
on:
  release:
    types: [published]

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: andrewthetechie/gha-clone-releases@v1.7.0  # Or search Marketplace for "copy-release" [web:30][web:40]
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          src_repo: darshan-regmi/veil
          dst_repo: darshan-regmi/project-releases
          copy_assets: true
